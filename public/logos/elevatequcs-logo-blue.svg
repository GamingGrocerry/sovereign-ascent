<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@500&amp;display=swap');
    </style>
  </defs>
  <!-- Logo Mark: E with two upward arrows -->
  <rect x="10" y="10" width="100" height="100" rx="4" fill="#0080FF"/>
  <text x="38" y="88" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="72" fill="#FFFFFF">E</text>
  <!-- Arrow 1 -->
  <polyline points="82,38 90,26 98,38" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="90" y1="26" x2="90" y2="48" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow 2 -->
  <polyline points="72,48 80,36 88,48" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <line x1="80" y1="36" x2="80" y2="55" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Wordmark -->
  <text x="130" y="58" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="36" fill="#0080FF" letter-spacing="-0.5">ElevateQCS</text>
  <text x="130" y="88" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#666666" letter-spacing="4">QUALITY · COMPLIANCE · SOLUTIONS</text>
</svg>